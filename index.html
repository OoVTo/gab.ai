<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAB.AI — Lyrics by Gab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@1,500;1,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root {
  --or1: #FF6B35;
  --or2: #FFA500;
  --or3: #FF4500;
  --or4: #FFD580;
  --dark: #080808;
  --dark2: #111111;
  --dark3: #1a1a1a;
  --text: #F0EAE0;
  --dim: #888;
  --glow: 0 0 40px rgba(255,107,53,0.55), 0 0 80px rgba(255,107,53,0.2);
}

html,body{width:100%;height:100%;background:var(--dark);color:var(--text);font-family:'Space Mono',monospace;}

/* ===== SPLASH ===== */
#splash{
  position:fixed;inset:0;background:var(--dark);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
  transition:opacity 0.8s ease;
}
#splash.gone{opacity:0;pointer-events:none;}

.sp-vinyl-outer{
  width:210px;height:210px;border-radius:50%;
  animation:splashSpin 1.8s linear infinite;
  position:relative;
  filter:drop-shadow(0 0 30px rgba(255,107,53,0.4));
}
.sp-vinyl{
  width:210px;height:210px;border-radius:50%;
  background:
    radial-gradient(circle at center,
      #0a0a0a 0%,#0a0a0a 4.2%,
      #FF6B35 4.2%,#FFA500 16.5%,
      #0a0a0a 16.5%,#0a0a0a 18.5%,
      #1d1d1d 18.5%,#0a0a0a 20%,
      #1d1d1d 20%,#0a0a0a 22%,
      #1d1d1d 22%,#0a0a0a 24.5%,
      #1d1d1d 24.5%,#0a0a0a 27%,
      #1d1d1d 27%,#0a0a0a 30%,
      #1d1d1d 30%,#0a0a0a 33.5%,
      #1d1d1d 33.5%,#0a0a0a 37%,
      #1d1d1d 37%,#0a0a0a 41%,
      #1d1d1d 41%,#0a0a0a 45.5%,
      #1d1d1d 45.5%,#0a0a0a 50%,
      #141414 50%,#0a0a0a 55%,
      #141414 55%,#0a0a0a 60%,
      #141414 60%,#0a0a0a 65%,
      #141414 65%,#0a0a0a 70%,
      #0a0a0a 70%,#0a0a0a 100%
    );
}
.sp-vinyl::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 30deg,transparent 0deg,rgba(255,255,255,0.07) 45deg,transparent 90deg,rgba(255,255,255,0.03) 150deg,transparent 210deg,rgba(255,255,255,0.06) 270deg,transparent 330deg,transparent 360deg);
}

.sp-letters{display:flex;gap:2px;}
.sp-l{
  font-family:'Bebas Neue',sans-serif;font-size:5.5rem;
  color:var(--or1);text-shadow:var(--glow);
  opacity:0;transform:translateY(55px);
  animation:letterUp 0.55s cubic-bezier(0.23,1,0.32,1) forwards;
}
.sp-l.dot{color:var(--text);}
.sp-l.ai{color:var(--text);}
@keyframes letterUp{to{opacity:1;transform:translateY(0);}}

.sp-sub{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1rem;color:var(--dim);letter-spacing:0.22em;
  opacity:0;animation:fadeUp 0.6s 2s ease forwards;
}
.sp-bar-shell{
  width:220px;height:2px;background:var(--dark3);border-radius:2px;
  overflow:hidden;opacity:0;animation:fadeUp 0.4s 0.4s ease forwards;
}
.sp-bar{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--or3),var(--or2),var(--or4));
  animation:barLoad 3.2s 0.4s ease forwards;
}
@keyframes barLoad{to{width:100%;}}
@keyframes fadeUp{to{opacity:1;}}
@keyframes splashSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* ===== EMOJI BG ===== */
#emojibg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.efloat{
  position:absolute;font-size:1.9rem;opacity:0.065;
  animation:emojiRise linear infinite;user-select:none;
}
@keyframes emojiRise{
  0%{transform:translateY(105vh) rotate(0deg);opacity:0;}
  8%{opacity:0.065;}
  92%{opacity:0.065;}
  100%{transform:translateY(-120px) rotate(720deg);opacity:0;}
}

/* ===== PAGE SYSTEM ===== */
.page{
  position:fixed;inset:0;opacity:0;visibility:hidden;pointer-events:none;
  transition:opacity 0.65s ease,visibility 0.65s ease;z-index:1;
}
.page.active{opacity:1;visibility:visible;pointer-events:all;}
#pg-songs.active,#pg-detail.active{overflow-y:auto;}

/* ===== LANDING ===== */
#pg-landing{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;text-align:center;overflow:hidden;
  background:radial-gradient(ellipse at 50% 55%,rgba(255,107,53,0.09) 0%,transparent 68%);
}
.land-line{position:absolute;height:1px;width:100%;background:linear-gradient(90deg,transparent,var(--or1),transparent);}
.land-line.top{top:0;}.land-line.bot{bottom:0;}
.land-line::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,165,0,0.4),transparent);
  animation:linePulse 3s ease-in-out infinite;
}
@keyframes linePulse{0%,100%{opacity:0.3;transform:scaleX(0.3);}50%{opacity:1;transform:scaleX(1);}}

.eq-row{display:flex;gap:5px;align-items:flex-end;height:55px;margin-bottom:18px;}
.eq-b{width:7px;background:linear-gradient(to top,var(--or3),var(--or2));border-radius:3px 3px 0 0;animation:eqB 0.7s ease-in-out infinite alternate;}
@keyframes eqB{from{height:8px;opacity:0.45;}to{height:55px;opacity:1;}}

.main-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(5.5rem,16vw,13rem);
  line-height:0.88;letter-spacing:0.02em;
  text-shadow:0 0 100px rgba(255,107,53,0.35),0 0 200px rgba(255,107,53,0.12);
  position:relative;
}
.main-title .dot{color:var(--or2);}
.main-title .ai{
  color:var(--or1);
  text-shadow:var(--glow);
  animation:titlePulse 4s ease-in-out infinite;
}
@keyframes titlePulse{
  0%,100%{text-shadow:0 0 40px rgba(255,107,53,0.6),0 0 80px rgba(255,107,53,0.25);}
  50%{text-shadow:0 0 60px rgba(255,107,53,0.9),0 0 120px rgba(255,107,53,0.4),0 0 200px rgba(255,107,53,0.15);}
}

.main-sub{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(1rem,2.5vw,1.45rem);
  color:var(--dim);letter-spacing:0.14em;
  margin:18px 0 50px;max-width:600px;
}

.enter-btn{
  font-family:'Space Mono',monospace;font-size:0.88rem;
  letter-spacing:0.3em;text-transform:uppercase;
  color:var(--dark);background:var(--or1);
  border:none;padding:17px 52px;cursor:pointer;
  clip-path:polygon(12px 0%,100% 0%,calc(100% - 12px) 100%,0% 100%);
  position:relative;overflow:hidden;
  transition:transform 0.25s ease,box-shadow 0.25s ease;
}
.enter-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--or2),var(--or3));
  transform:translateX(-110%);transition:transform 0.35s ease;
}
.enter-btn:hover::before{transform:translateX(0);}
.enter-btn:hover{transform:translateY(-4px);box-shadow:0 15px 40px rgba(255,107,53,0.5);}
.enter-btn span{position:relative;z-index:1;}

.land-note{
  position:absolute;opacity:0.1;
  animation:landFloat 7s ease-in-out infinite;pointer-events:none;
}
@keyframes landFloat{0%,100%{transform:translateY(0) rotate(-8deg);}50%{transform:translateY(-35px) rotate(8deg);}}

/* ===== SONGS PAGE ===== */
#pg-songs{background:var(--dark);}
.songs-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:26px 60px;
  border-bottom:1px solid rgba(255,107,53,0.12);
  position:sticky;top:0;
  background:rgba(8,8,8,0.94);backdrop-filter:blur(24px);z-index:10;
}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--or1);letter-spacing:0.06em;}
.back-btn{
  font-family:'Space Mono',monospace;font-size:0.72rem;
  letter-spacing:0.2em;color:var(--dim);
  background:none;border:1px solid rgba(255,107,53,0.25);
  padding:9px 20px;cursor:pointer;text-transform:uppercase;
  transition:all 0.25s ease;
}
.back-btn:hover{color:var(--or1);border-color:var(--or1);background:rgba(255,107,53,0.05);}

.songs-hero{text-align:center;padding:55px 20px 35px;}
.songs-hero-title{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;color:var(--text);letter-spacing:0.25em;}
.songs-hero-sub{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--dim);font-size:0.95rem;margin-top:7px;letter-spacing:0.12em;}

.songs-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:55px 40px;
  padding:40px 60px 80px;
  max-width:1200px;margin:0 auto;
}

/* ===== VINYL DISC ===== */
.song-card{
  display:flex;flex-direction:column;align-items:center;gap:18px;
  cursor:pointer;position:relative;
  opacity:0;transform:translateY(28px);
}
.song-card.vis{animation:cardIn 0.65s cubic-bezier(0.23,1,0.32,1) forwards;}
@keyframes cardIn{to{opacity:1;transform:translateY(0);}}

.disc-wrap{
  position:relative;width:220px;height:220px;
  transition:transform 0.35s cubic-bezier(0.23,1,0.32,1);
}
.song-card:hover .disc-wrap{transform:translateY(-12px) scale(1.05);}

.disc{
  width:220px;height:220px;border-radius:50%;
  position:relative;
  box-shadow:0 6px 40px rgba(0,0,0,0.85),0 0 0 1px rgba(255,107,53,0.04),inset 0 0 30px rgba(0,0,0,0.5);
  transition:box-shadow 0.35s ease;
  overflow:hidden;
}
.disc::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 20deg,transparent 0deg,rgba(255,255,255,0.055) 40deg,transparent 80deg,rgba(255,255,255,0.025) 145deg,transparent 200deg,rgba(255,255,255,0.045) 265deg,transparent 330deg,transparent 360deg);
  pointer-events:none;z-index:2;
}
.song-card:hover .disc{
  box-shadow:0 20px 60px rgba(0,0,0,0.9),0 0 0 1px rgba(255,107,53,0.18),0 0 50px rgba(255,107,53,0.22),inset 0 0 30px rgba(0,0,0,0.5);
}

/* ── Per-song disc themes ── */

/* 01 — deep ocean */
.disc-01{
  background:
    radial-gradient(circle at center,
      #0a0a0a 0%,#0a0a0a 4.2%,#1a4a7a 4.2%,#0d3055 17%,
      #0a0a0a 17%,#0a0a0a 19%,#0d2244 19%,#0a0a12 21%,
      #0d2244 21%,#0a0a12 24%,#0d2244 24%,#0a0a12 27%,
      #0d2244 27%,#0a0a12 31%,#0d2244 31%,#0a0a12 35.5%,
      #0d2244 35.5%,#0a0a12 40%,#0d2244 40%,#0a0a12 45%,
      #0d2244 45%,#0a0a12 51%,#111428 51%,#0a0a12 57%,
      #111428 57%,#0a0a12 63%,#0a0a12 63%,#0a0a12 100%);
}
.disc-01 .disc-label{background:radial-gradient(circle,#4fc3f7 0%,#1565c0 45%,#0d3055 75%,#071a2e 100%);}

/* 02 — LAST SPARK */
.disc-02{

    radial-gradient(circle at center,

      #121212 38%,#0a0808 44%,#111111 44%,#0a0808 51%,
      #141414 51%,#0a0808 58%,#141414 58%,#0a0808 65%,
      #0a0808 65%,#0a0808 100%);
}
.disc-02 .disc-label{background:radial-gradient(circle,#fff3e0 0%,#ff6b00 35%,#b71c1c 70%,#3e0000 100%);}

/* 03 — MATA */
.disc-03{
  background:
    radial-gradient(circle at center,
      #0a0a0a 0%,#0a0a0a 4.2%,#00695c 4.2%,#004d40 17%,
      #0a0a0a 17%,#0a0a0a 19%,#012d27 19%,#040f0d 21%,
      #012d27 21%,#040f0d 24%,#013328 24%,#040f0d 28%,
      #012d27 28%,#040f0d 33%,#013328 33%,#040f0d 39%,

      #0a1410 52%,#040f0d 59%,#040f0d 59%,#040f0d 100%);
}
.disc-03 .disc-label{background:radial-gradient(circle,#e8f5e9 0%,#26a69a 30%,#004d40 65%,#001a15 100%);}
.disc-03::after{
  content:'';position:absolute;inset:0;border-radius:50%;z-index:1;
  background:radial-gradient(ellipse 8% 40% at 50% 50%,rgba(0,0,0,0.9) 0%,transparent 100%);
  pointer-events:none;
}

/* 04 — Pwede Paulit */
.disc-04{
  background:
    radial-gradient(circle at center,
      #0a0a0a 0%,#0a0a0a 4.2%,#9c27b0 4.2%,#7b1fa2 17%,
      #0a0a0a 17%,#0a0a0a 19%,#1a0a1e 19%,#0d0710 21%,
      #1a0a1e 21%,#0d0710 24%,#200b26 24%,#0d0710 28%,
      #1a0a1e 28%,#0d0710 33%,#1e0922 33%,#0d0710 39%,
      #1a0a1e 39%,#0d0710 46%,#160818 46%,#0d0710 53%,
      #160818 53%,#0d0710 60%,#0d0710 60%,#0d0710 100%);
}
.disc-04 .disc-label{background:radial-gradient(circle,#f8bbd9 0%,#e91e8c 35%,#9c27b0 70%,#2d0038 100%);}
.disc-04::after{
  content:'';position:absolute;inset:0;border-radius:50%;z-index:1;
  background:conic-gradient(from 0deg,transparent 0deg,rgba(233,30,140,0.18) 60deg,transparent 120deg,rgba(156,39,176,0.15) 180deg,transparent 240deg,rgba(233,30,140,0.12) 300deg,transparent 360deg);
  pointer-events:none;
}

/* 05 — Salamat Kaibigan */
.disc-05{
  background:
    radial-gradient(circle at center,
      #0a0a0a 0%,#0a0a0a 4.2%,#f9a825 4.2%,#f57f17 17%,

      #161000 39%,#100a00 46%,#141000 46%,#100a00 53%,
      #141000 53%,#100a00 60%,#100a00 60%,#100a00 100%);
}
.disc-05 .disc-label{background:radial-gradient(circle,#fffde7 0%,#ffd54f 35%,#f9a825 70%,#5d3a00 100%);}

/* 06 — Suntok */
.disc-06{
  background:
    radial-gradient(circle at center,
      #0a0a0a 0%,#0a0a0a 4.2%,#c62828 4.2%,#7f0000 17%,
      #0a0a0a 17%,#0a0a0a 19%,#1a0505 19%,#0a0303 21%,
      #200606 21%,#0a0303 25%,#1a0505 25%,#0a0303 30%,
      #1a0505 30%,#0a0303 36%,#140404 36%,#0a0303 43%,

}
.disc-06 .disc-label{background:radial-gradient(circle,#ffcdd2 0%,#ef5350 35%,#b71c1c 70%,#260000 100%);}
.disc-06::after{
  content:'';position:absolute;inset:0;border-radius:50%;z-index:1;
  background:conic-gradient(from 15deg,transparent 0deg,rgba(255,50,50,0.15) 8deg,transparent 16deg,
    transparent 80deg,rgba(255,50,50,0.1) 88deg,transparent 96deg,
    transparent 160deg,rgba(255,50,50,0.12) 168deg,transparent 176deg,
    transparent 240deg,rgba(255,50,50,0.1) 248deg,transparent 256deg,
    transparent 320deg,rgba(255,50,50,0.13) 328deg,transparent 336deg);
  pointer-events:none;
}

/* 07 — 어디로 어디로 */
.disc-07{
  background:
    radial-gradient(circle at center,
      #0a0a0a 0%,#0a0a0a 4.2%,#b0bec5 4.2%,#78909c 17%,
      #0a0a0a 17%,#0a0a0a 19%,#0d1117 19%,#080c12 21%,

      #0b0e16 39%,#080c12 46%,#0f1520 46%,#080c12 53%,
      #141a24 53%,#080c12 60%,#080c12 60%,#080c12 100%);
}
.disc-07 .disc-label{background:radial-gradient(circle,#ffffff 0%,#cfd8dc 30%,#546e7a 65%,#0d1117 100%);}
.disc-07::after{
  content:'';position:absolute;inset:0;border-radius:50%;z-index:1;
  background:
    radial-gradient(1px 1px at 30% 25%,rgba(255,255,255,0.9) 0%,transparent 100%),
    radial-gradient(1px 1px at 65% 18%,rgba(255,255,255,0.7) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 80% 40%,rgba(255,255,255,0.8) 0%,transparent 100%),
    radial-gradient(1px 1px at 20% 60%,rgba(255,255,255,0.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 55% 75%,rgba(255,255,255,0.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 72% 68%,rgba(255,255,255,0.7) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 40% 80%,rgba(255,255,255,0.6) 0%,transparent 100%);
  pointer-events:none;
}

/* 08 — regular */
.disc-08{
  background:
    radial-gradient(circle at center,
      #0a0a0a 0%,#0a0a0a 4.2%,#757575 4.2%,#424242 17%,
      #0a0a0a 17%,#0a0a0a 19%,#181818 19%,#0e0e0e 21%,
      #181818 21%,#0e0e0e 24%,#1a1a1a 24%,#0e0e0e 28%,
      #181818 28%,#0e0e0e 33%,#161616 33%,#0e0e0e 39%,

}
.disc-08 .disc-label{background:radial-gradient(circle,#f5f5f5 0%,#9e9e9e 40%,#424242 75%,#111 100%);}
.disc-08::after{
  content:'';position:absolute;inset:0;border-radius:50%;z-index:1;
  background:conic-gradient(from 0deg,
    rgba(255,100,100,0.08) 0deg,rgba(255,200,50,0.08) 45deg,rgba(100,255,100,0.08) 90deg,
    rgba(50,200,255,0.08) 135deg,rgba(150,50,255,0.08) 180deg,rgba(255,50,200,0.08) 225deg,

  animation:iridSpin 8s linear infinite;pointer-events:none;
}
@keyframes iridSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* 09 — GARDEN */
.disc-09{
  background:
    radial-gradient(circle at center,
      #0a0a0a 0%,#0a0a0a 4.2%,#388e3c 4.2%,#1b5e20 17%,
      #0a0a0a 17%,#0a0a0a 19%,#0d1f0d 19%,#060f06 21%,
      #0f240f 21%,#060f06 24%,#0d1f0d 24%,#060f06 28%,
      #112611 28%,#060f06 33%,#0d1f0d 33%,#060f06 39%,
      #0f240f 39%,#060f06 46%,#0a1a0a 46%,#060f06 53%,
      #0a1a0a 53%,#060f06 60%,#060f06 60%,#060f06 100%);
}
.disc-09 .disc-label{background:radial-gradient(circle,#f1f8e9 0%,#aed581 30%,#388e3c 65%,#0a1f0a 100%);}
.disc-09::after{
  content:'';position:absolute;inset:0;border-radius:50%;z-index:1;
  background:
    radial-gradient(ellipse 3px 16px at 32% 22%,rgba(120,200,80,0.3) 0%,transparent 100%),
    radial-gradient(ellipse 2px 12px at 62% 28%,rgba(100,180,60,0.25) 0%,transparent 100%),
    radial-gradient(ellipse 3px 18px at 78% 52%,rgba(130,210,90,0.28) 0%,transparent 100%),
    radial-gradient(ellipse 2px 13px at 22% 67%,rgba(110,190,70,0.22) 0%,transparent 100%),
    radial-gradient(ellipse 2px 11px at 52% 82%,rgba(100,180,60,0.2) 0%,transparent 100%),
    radial-gradient(ellipse 3px 15px at 70% 75%,rgba(120,200,80,0.25) 0%,transparent 100%);
  pointer-events:none;
}

/* ── Shared disc label ── */
.disc-label{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:75px;height:75px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:3;
  box-shadow:0 0 18px rgba(0,0,0,0.6);
}

// Core spawner — uses Web Animations API for smooth, no-jank particles
function spawnParticle({ x, y, content, size = 18, dx = 0, dy = -60, rotate = 0, duration = 900, color = null }) {
  const el = document.createElement('div');
  el.style.cssText = `
    position:fixed;left:${x}px;top:${y}px;
    pointer-events:none;z-index:9000;
    font-size:${size}px;line-height:1;
    user-select:none;will-change:transform,opacity;
  `;
  if (color) {
    // colored shape (circle or custom)
    el.style.width  = size + 'px';
    el.style.height = size + 'px';
    el.style.borderRadius = '50%';
    el.style.background   = color;
    el.style.fontSize     = '0';
  } else {
    el.textContent = content;
  }
  document.body.appendChild(el);
  el.animate([
    { transform:`translate(0px,0px) scale(1) rotate(0deg)`, opacity:1 },
    { transform:`translate(${dx}px,${dy}px) scale(0.2) rotate(${rotate}deg)`, opacity:0 }
  ], { duration, easing:'cubic-bezier(0.25,0.46,0.45,0.94)', fill:'forwards' })
    .onfinish = ()=>el.remove();
}

    left:${cx}px;top:${cy}px;
    width:${size}px;height:${size}px;
    border-color:${color};

  setTimeout(()=>el.remove(), 900);
}

// ═══════════════════════════════════════════════════════════════
//  Build songs grid
// ═══════════════════════════════════════════════════════════════
const grid=document.getElementById('songs-grid');
const particleTimers = new Map(); // discWrap → intervalId

SONGS.forEach((song,i)=>{
  const card=document.createElement('div');
  card.className='song-card';
  card.innerHTML=`
    <div class="disc-wrap">
      <div class="disc ${song.discClass}">
        <div class="disc-label">
          <span class="dlabel-brand">GAB.AI</span>
          <div class="dlabel-hole"></div>
          <span class="dlabel-num">${song.num}</span>
        </div>
      </div>
      <div class="disc-glow"></div>
    </div>
    <div class="song-meta">
      <span class="song-tracknum">Track ${song.num}</span>
      <div class="song-name">${song.title}</div>
      <span class="prev-tag">● CLICK TO OPEN</span>
    </div>`;

  const disc = card.querySelector('.disc');
  const discWrap = card.querySelector('.disc-wrap');
  const fx = DISC_FX[song.num] || DISC_FX['01'];

  // Hover → spin + particles
  card.addEventListener('mouseenter', ()=>{
    disc.classList.add('disc-spin');
    const tid = setInterval(()=>{
      const rect = discWrap.getBoundingClientRect();
      const cx = rect.left + rect.width/2;
      const cy = rect.top  + rect.height/2;
      fx.spawnFn(cx, cy);
    }, fx.interval);
    particleTimers.set(discWrap, tid);
  });

  card.addEventListener('mouseleave', ()=>{
    disc.classList.remove('disc-spin');
    clearInterval(particleTimers.get(discWrap));
    particleTimers.delete(discWrap);
  });

  // Click → burst + open
  card.addEventListener('click', ()=>{
    const rect = discWrap.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top  + rect.height/2;
    if(fx.clickFn) fx.clickFn(cx, cy);
    setTimeout(()=>openDetail(song), 120);
  });

  grid.appendChild(card);
  setTimeout(()=>card.classList.add('vis'), i*90);
});

// ═══════════════════════════════════════════════════════════════
//  Detail page — big disc particles while playing
// ═══════════════════════════════════════════════════════════════
let bigDiscTimer = null;
let currentSong  = null;

function startBigDiscFX() {
  if(!currentSong) return;
  stopBigDiscFX();
  const fx = DISC_FX[currentSong.num];
  if(!fx) return;
  bigDiscTimer = setInterval(()=>{
    const bigWrap = document.getElementById('big-disc-wrap');
    const rect = bigWrap.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top  + rect.height/2;
    fx.spawnFn(cx, cy);
  }, fx.interval * 1.5); // slightly slower for the big disc
}

function stopBigDiscFX() {
  if(bigDiscTimer) { clearInterval(bigDiscTimer); bigDiscTimer = null; }
}

// Big disc click → burst
document.getElementById('big-disc-wrap').addEventListener('click', ()=>{
  if(!currentSong) return;
  const fx = DISC_FX[currentSong.num];
  const bigWrap = document.getElementById('big-disc-wrap');
  const rect = bigWrap.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top  + rect.height/2;
  if(fx && fx.clickFn) fx.clickFn(cx, cy);
});

// ═══════════════════════════════════════════════════════════════
//  Page navigation
// ═══════════════════════════════════════════════════════════════
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goToSongs(){
  showPage('pg-songs');
  document.querySelectorAll('.song-card').forEach((c,i)=>{
    c.classList.remove('vis');
    setTimeout(()=>c.classList.add('vis'), i*90);
  });
}

function openDetail(song){
  currentSong = song;
  document.getElementById('d-tracknum').textContent = `Track ${song.num}`;
  document.getElementById('d-title').textContent = song.title;

  const bigDisc = document.getElementById('big-disc');
  bigDisc.setAttribute('data-song', song.num);
  bigDisc.classList.add('playing');
  document.getElementById('tonearm').style.transform = 'rotate(-18deg)';
  document.getElementById('d-iframe').src = `https://drive.google.com/file/d/${song.id}/preview`;

  showPage('pg-detail');
  setTimeout(startBigDiscFX, 400);
}

function closeDetail(){
  stopBigDiscFX();
  currentSong = null;
  document.getElementById('d-iframe').src = '';
  const bigDisc = document.getElementById('big-disc');
  bigDisc.classList.remove('playing');
  document.getElementById('tonearm').style.transform = 'rotate(-35deg)';
  showPage('pg-songs');
}

// ── Cursor sparkle ────────────────────────────────────────────────────────────
document.addEventListener('mousemove', e=>{
  if(Math.random()>0.88){
    const sp=document.createElement('div');
    sp.style.cssText=`position:fixed;pointer-events:none;z-index:9998;left:${e.clientX-3}px;top:${e.clientY-3}px;width:6px;height:6px;border-radius:50%;background:rgba(255,165,0,0.8);animation:sparkFade 0.6s ease forwards;`;
    document.body.appendChild(sp);
    setTimeout(()=>sp.remove(),620);
  }
});
const ks=document.createElement('style');
ks.textContent='@keyframes sparkFade{0%{transform:scale(1);opacity:0.8;}100%{transform:scale(0) translateY(-10px);opacity:0;}}';
document.head.appendChild(ks);
</script>
